const sb = DEMO_MODE ? null : supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ detectSessionInUrl:true, persistSession:true, autoRefreshToken:true, flowType:'implicit' }});
const AGENCIES = [{id:'apla',name:'APLA Health'},{id:'ncjw',name:'NCJW | LA'},{id:'city',name:'City of West Hollywood'}];
const FY='FY26';
const HH_COMPOSITION=['Single Adult','Adult Couple (no children)','Single Parent w/ Children','Two Parents w/ Children','Multi-generational','Other'];
const HOUSING_STATUS_INTAKE=['Permanently Housed - Lease in own name','Permanently Housed - On lease w/ others','Doubled-up / Couch Surfing','Rental w/ Eviction Notice','Hotel/Motel (self-pay)','Subsidized Housing','Other'];
const HOUSING_STATUS_FULL=[...HOUSING_STATUS_INTAKE.slice(0,5),'Emergency Shelter','Transitional Housing','Unsheltered',...HOUSING_STATUS_INTAKE.slice(5)];
const QUALIFYING_EVENT=['Loss of Employment','Reduction in Income','Medical Emergency','Domestic Violence','Death of Household Member','Disability Onset','Eviction Notice','Utility Shutoff','Family Conflict','Natural Disaster','Other'];
const RACE_ETHNICITY=['American Indian or Alaska Native','Asian','Black or African American','Hispanic or Latino/a/e','Middle Eastern or North African','Native Hawaiian or Pacific Islander','White','Multi-racial','Client Declined','Unknown'];
const GENDER=['Female','Male','Non-binary','Transgender','Other','Client Declined'];
const ASSISTANCE_TYPE=['Rental Arrears','Forward Rent','Security Deposit','Utility Assistance','Moving Costs','Application Fees','Furniture/Household Goods','Transportation','Childcare','Other'];
const SERVICE_CATEGORY=['Intake Assessment','Case Management','Housing Search Support','Landlord Mediation','Benefits Enrollment','Employment Support','Financial Counseling','Legal Referral','Mental Health Referral','Follow-up Check-in','Other'];
let state={session:null,profile:null,households:[],users:[],activity:[],currentId:null,charts:{},agencyFilter:'all',reportQuarter:'Q4-2026',reportAgency:'all'};
const REPORT_QUARTERS={
  'Q1-2026':{label:'Q1',fy:'FY 2025–26',period:'October 1 – December 31, 2025',start:'2025-10-01',end:'2025-12-31'},
  'Q2-2026':{label:'Q2',fy:'FY 2025–26',period:'January 1 – March 31, 2026',start:'2026-01-01',end:'2026-03-31'},
  'Q3-2026':{label:'Q3',fy:'FY 2025–26',period:'April 1 – June 30, 2026',start:'2026-04-01',end:'2026-06-30'},
  'Q4-2026':{label:'Q4',fy:'FY 2025–26',period:'July 1 – September 30, 2026',start:'2026-07-01',end:'2026-09-30'}
};
function redirectUrl(){return window.location.origin+window.location.pathname}function cleanUrl(){if(location.hash.includes('access_token')) history.replaceState({},document.title,redirectUrl())}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function uid(p='id'){return p+'_'+Math.random().toString(36).slice(2,10)}function money(n){return '$'+Math.round(Number(n)||0).toLocaleString()}function pct(n){return !n?'0%':(n*100).toFixed(0)+'%'}function agencyName(id){return (AGENCIES.find(a=>a.id===id)||{}).name||id||'—'}function isCity(){return state.profile&&['city_admin','city_viewer'].includes(state.profile.user_type)}function isAdmin(){return state.profile&&state.profile.user_type==='city_admin'}function toast(m,k=''){let t=document.getElementById('toast');t.textContent=m;t.className='toast show '+k;setTimeout(()=>t.className='toast',2600)}
function fiscalQuarter(d){if(!d)return'';let x=new Date(d+'T00:00:00');if(isNaN(x))return'';let t=x.toISOString().slice(0,10);for(const [key,q] of Object.entries(REPORT_QUARTERS)){if(t>=q.start&&t<=q.end)return q.label+' '+q.fy}let m=x.getMonth()+1;let y=x.getFullYear();if(m>=10)return 'Q1 FY '+(y+1);if(m<=3)return 'Q2 FY '+y;if(m<=6)return 'Q3 FY '+y;return 'Q4 FY '+y}function dateOnly(v){return v?String(v).slice(0,10):''}
function betweenDates(d,start,end){d=dateOnly(d);return !!d&&d>=start&&d<=end}
function overlapsQuarter(start,end,q){let s=dateOnly(start),e=dateOnly(end)||q.end;if(!s)return false;return s<=q.end&&e>=q.start}
function inReportQuarter(h,key=state.reportQuarter){
  let q=REPORT_QUARTERS[key];
  if(!q||!h)return false;

  // Count households opened during the quarter.
  if(betweenDates(h.intake_date,q.start,q.end)) return true;

  // Count households receiving financial assistance during the quarter.
  if(betweenDates(h.assistance_start,q.start,q.end)||betweenDates(h.assistance_end,q.start,q.end)||overlapsQuarter(h.assistance_start,h.assistance_end,q)) return true;

  // Count assistance/service log activity during the quarter.
  if((h.assistance_log||[]).some(e=>betweenDates(e.date,q.start,q.end))) return true;
  if((h.service_log||[]).some(e=>betweenDates(e.date,q.start,q.end))) return true;

  // Count records that were already open before/through the period and not clearly closed before the period.
  if(h.intake_date && dateOnly(h.intake_date)<=q.end && (!h.assistance_end || dateOnly(h.assistance_end)>=q.start)) return true;

  return false;
}function ageBand(a){a=Number(a);if(!a)return'';if(a<18)return'Under 18';if(a<25)return'18-24';if(a<35)return'25-34';if(a<45)return'35-44';if(a<55)return'45-54';if(a<62)return'55-61';return'62+'}function stable(h){let ok=s=>s&&(s.includes('Permanently')||s.includes('Subsidized'));if(!h.housing_at_exit||!h.housing_90day)return'pending';return ok(h.housing_at_exit)&&ok(h.housing_90day)?'stable':'unstable'}function assistTotal(h){return (h.assistance_log||[]).reduce((s,e)=>s+Number(e.amount||0),0)}function sessions(h){return (h.service_log||[]).length}function scopedHouseholds(){if(isCity()&&state.agencyFilter!=='all')return state.households.filter(h=>h.agency_id===state.agencyFilter);return state.households}
function canDeleteHH(h){return isCity() || (state.profile&&h.agency_id===state.profile.agency_id)}
function outcomeSummary(h){let exited=h.filter(x=>x.housing_at_exit).length,active=h.length-exited,stableCount=h.filter(x=>stable(x)==='stable').length,unstableCount=h.filter(x=>stable(x)==='unstable').length,pending=h.filter(x=>stable(x)==='pending').length;return {active,exited,stableCount,unstableCount,pending,base:stableCount+unstableCount}}
function quarterMetrics(h,key=state.reportQuarter){
  let q=REPORT_QUARTERS[key];
  let newIntakes=h.filter(x=>betweenDates(x.intake_date,q.start,q.end)).length;
  let closedCases=h.filter(x=>betweenDates(x.assistance_end,q.start,q.end)||!!x.housing_at_exit).length;
  let ongoingCases=h.filter(x=>{
    let intake=dateOnly(x.intake_date);
    let end=dateOnly(x.assistance_end);
    return intake && intake<=q.end && (!end || end>=q.start);
  }).length;
  return {newIntakes,closedCases,ongoingCases};
}

function cleanDate(v){return v && /^\d{4}-\d{2}-\d{2}$/.test(String(v)) ? v : null}
function cleanNumber(v){return v===null||v===undefined||v==='' ? null : Number(v)}
function householdPayload(h){
  return {
    id: h.id,
    hh_id: h.hh_id || '',
    agency_id: isCity() ? h.agency_id : state.profile.agency_id,
    intake_date: cleanDate(h.intake_date),
    hh_composition: h.hh_composition || null,
    hh_size: cleanNumber(h.hh_size),
    monthly_income: cleanNumber(h.monthly_income),
    housing_at_intake: h.housing_at_intake || null,
    age_primary: cleanNumber(h.age_primary),
    race_ethnicity: h.race_ethnicity || null,
    gender: h.gender || null,
    veteran: h.veteran || null,
    disability: h.disability || null,
    eligible: h.eligible || null,
    qualifying_event: h.qualifying_event || null,
    assistance_start: cleanDate(h.assistance_start),
    assistance_end: cleanDate(h.assistance_end),
    arrears_flag: h.arrears_flag || null,
    arrears_amount: cleanNumber(h.arrears_amount) || 0,
    benefits_cert: h.benefits_cert || null,
    housing_at_entry: h.housing_at_entry || null,
    housing_at_exit: h.housing_at_exit || null,
    housing_90day: h.housing_90day || null,
    success_story: h.success_story || null,
    assistance_log: Array.isArray(h.assistance_log) ? h.assistance_log.map(x=>({
      date: cleanDate(x.date),
      type: x.type || '',
      amount: cleanNumber(x.amount) || 0,
      notes: x.notes || ''
    })) : [],
    service_log: Array.isArray(h.service_log) ? h.service_log.map(x=>({
      date: cleanDate(x.date),
      category: x.category || x.type || '',
      notes: x.notes || ''
    })) : [],
    created_at: h.created_at || new Date().toISOString(),
    updated_at: new Date().toISOString(),
    updated_by: state.profile.email
  }
}
function validateHH(h){
  const missing=[];
  if(!h.hh_id) missing.push('Household ID');
  if(!h.agency_id) missing.push('Agency');
  if(missing.length){toast('Please complete: '+missing.join(', '),'err');return false}
  return true
}
async function persistHH(h){
  if(!validateHH(h)) return false;
  const payload=householdPayload(h);
  if(DEMO_MODE){let i=state.households.findIndex(x=>x.id===payload.id);if(i>=0)state.households[i]=payload;else state.households.unshift(payload);saveLocal();return true}
  let {error}=await sb.from('rphp_households').upsert(payload,{onConflict:'id'}).select('id').single();
  if(error){
    console.error('Household save failed', error, payload);
    toast('Save failed: '+(error.message||'Unknown Supabase error'),'err');
    return false
  }
  await logAct('Saved household',payload.hh_id,payload.agency_id);
  await loadAll();
  return true
}
async function logAct(action,hh,agency){let row={id:uid('act'),action,hh_id:hh||null,agency_id:agency||null,actor_email:state.profile.email,created_at:new Date().toISOString()};if(DEMO_MODE){state.activity.unshift(row);saveLocal();return}let {error}=await sb.from('rphp_activity_log').insert(row);if(error)console.warn('Activity log insert failed',error)}

function agencyFilterHtml(){if(!isCity())return'';return`<div class="toolbar"><div class="filters"><label><strong>Agency view:</strong></label><select onchange="state.agencyFilter=this.value;renderCurrent()"><option value="all" ${state.agencyFilter==='all'?'selected':''}>All agencies</option><option value="apla" ${state.agencyFilter==='apla'?'selected':''}>APLA Health</option><option value="ncjw" ${state.agencyFilter==='ncjw'?'selected':''}>NCJW | LA</option></select></div></div>`}function filterLabel(){return isCity()?(state.agencyFilter==='all'?'APLA + NCJW':agencyName(state.agencyFilter)):agencyName(state.profile.agency_id)}function renderCurrent(){let v=document.querySelector('.view:not(.hidden)').id.replace('view-','');nav(v)}

function openHH(id){let h=state.households.find(x=>x.id===id);if(h)renderEditor(h)}function dateAttrs(){return `min="2025-01-01" max="2035-12-31" onkeydown="return false" onpaste="return false" onclick="this.showPicker&&this.showPicker()" onfocus="this.showPicker&&this.showPicker()"`}function field(h,k,label,type='text',opts=[]){let v=h[k]??'';if(type==='select')return`<div class="field"><label>${label}</label><select onchange="updateHH('${k}',this.value)"><option value="">— Select —</option>${opts.map(o=>`<option value="${esc(o)}" ${v===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;if(type==='textarea')return`<div class="field full"><label>${label}</label><textarea onchange="updateHH('${k}',this.value)">${esc(v)}</textarea></div>`;let extra=type==='date'?dateAttrs():'';return`<div class="field"><label>${label}</label><input type="${type}" ${extra} value="${esc(v)}" onchange="updateHH('${k}',this.value)"></div>`}

ocumentation</div><div class="section-body"><div class="form-grid">${field(h,'eligible','Met program eligibility','select',['Yes','No'])}${field(h,'qualifying_event','Qualifying event / crisis','select',QUALIFYING_EVENT)}${field(h,'assistance_start','Date assistance began','date')}${field(h,'assistance_end','Date assistance ended','date')}${field(h,'arrears_flag','Rental arrears at intake?','select',['Yes','No'])}${field(h,'arrears_amount','Rental arrears owed at intake','number')}${field(h,'benefits_cert','Benefits Impact Consultation completed','select',['Yes','No'])}</div></div></div><div class="section"><div class="section-title">Financial Assistance Disbursement Log</div><div class="section-body">${renderAssistLog(h)}<button class="btn subtle sm" onclick="addAssist()">+ Add disbursement</button></div></div><div class="section"><div class="section-title">Case Management / Services Log</div><div class="section-body">${renderServiceLog(h)}<button class="btn subtle sm" onclick="addService()">+ Add session</button></div></div><div class="section"><div class="section-title">Housing Outcomes</div><div class="section-body"><div class="form-grid">${field(h,'housing_at_entry','Housing status at program entry','select',HOUSING_STATUS_INTAKE)}${field(h,'housing_at_exit','Housing status at program exit','select',HOUSING_STATUS_FULL)}${field(h,'housing_90day','Housing status 90 days after exit','select',HOUSING_STATUS_FULL)}<div class="field"><label>Housing stability maintained at 90 days</label><input readonly value="${stable(h)==='stable'?'Yes — stable':stable(h)==='unstable'?'No — unstable':'Pending'}"></div>${field(h,'success_story','Narrative / Success Story','textarea')}</div></div></div><div class="bottom-actions">${canDeleteHH(h)?`<button class="btn danger" onclick="deleteHH('${h.id}')">Delete Record</button>`:''}<button class="btn secondary" onclick="nav('households')">Cancel / Back to Households</button><button class="btn" onclick="saveCurrent()">Save Record</butto function current(){return state.households.find(x=>x.id===state.currentId)}function updateHH(k,v){let h=current();if(!h)return;if(['hh_size','monthly_income','age_primary','arrears_amount'].includes(k))v=v===''?null:Number(v);h[k]=v;if(k==='agency_id'&&h.hh_id){let prefix=v==='ncjw'?'NCJW':'APLA';h.hh_id=h.hh_id.replace(/^(APLA|NCJW)-/,prefix+'-')}renderEditor(h)}async function saveCurrent(){let h=current();if(!h)return;let ok=await persistHH(h);if(ok){toast('Household saved','ok');state.currentId=null;nav('households')}}

function addAssist(){let h=current();h.assistance_log=h.assistance_log||[];h.assistance_log.push({date:'',type:'',amount:0,notes:''});renderEditor(h)}function updAssist(i,k,v){let h=current();if(k==='amount')v=Number(v)||0;h.assistance_log[i][k]=v;renderEditor(h)}function delAssist(i){let h=current();h.assistance_log.splice(i,1);renderEditor(h)}function addService(){let h=current();h.service_log=h.service_log||[];h.service_log.push({date:'',category:'',notes:''});renderEditor(h)}function updService(i,k,v){let h=current();h.service_log[i][k]=v;renderEditor(h)}function delService(i){let h=current();h.service_log.splice(i,1);renderEditor(h)}
function renderDashboard(){let h=scopedHouseholds(),out=outcomeSummary(h);document.getElementById('view-dashboard').innerHTML=`<div class="page-head"><div><h1 class="page-title">Dashboard</h1><p class="page-sub">Program activity, demographics, assistance, services, and housing outcomes.</p></div></div>${agencyFilterHtml()}<div class="cards" id="dash-kpis"></div><div class="grid2"><div class="card"><div class="card-head"><p class="card-title">Households by Quarter</p></div><div class="card-body"><div class="chartbox"><canvas id="chartQ"></canvas></div></div></div><div class="card"><div class="card-head"><p class="card-title">Assistance by Quarter</p></div><div class="card-body"><div class="chartbox"><canvas id="chartA"></canvas></div></div></div></div><div class="grid2" style="margin-top:16px"><div class="card"><div class="card-head"><p class="card-title">Housing Outcomes</p></div><div class="card-body"><table class="breakdown"><tbody id="bd-outcomes"></tbody></table></div></div><div class="card"><div class="card-head"><p class="card-title">Housing Status at Exit</p></div><div class="card-body"><table class="breakdown"><tbody id="bd-exit"></tbody></table></div></div></div><div class="grid2" style="margin-top:16px"><div class="card"><div class="card-head"><p class="card-title">Race / Ethnicity</p></div><div class="card-body"><table class="breakdown"><tbody id="bd-race"></tbody></table></div></div><div class="card"><div class="card-head"><p class="card-title">Age Bands</p></div><div class="card-body"><table class="breakdown"><tbody id="bd-age"></tbody></table></div></div><div class="card"><div class="card-head"><p class="card-title">Household Composition</p></div><div class="card-body"><table class="breakdown"><tbody id="bd-comp"></tbody></table></div></div><div class="card"><div class="card-head"><p class="card-title">Qualifying Event</p></div><div class="card-body"><table class="breakdown"><tbody id="bd-event"></tbody></table></div></div></div>`;let assist=h.reduce((s,x)=>s+assistTotal(x),0),serv=h.reduce((s,x)=>s+sessions(x),0);document.getElementById('dash-kpis').innerHTML=`<div class="card kpi"><div class="label">Households served</div><div class="value">${h.length}</div><div class="sub">${filterLabel()}</div></div><div class="card kpi"><div class="label">Financial assistance</div><div class="value">${money(assist)}</div></div><div class="card kpi"><div class="label">Case management sessions</div><div class="value">${serv}</div></div><div class="card kpi"><div class="label">Stable at 90 days</div><div class="value">${pct(out.base?out.stableCount/out.base:0)}</div><div class="sub">${out.stableCount} of ${out.base} with 90-day outcome</div></div>`;document.getElementById('bd-outcomes').innerHTML=`<tr><td>Active / in progress</td><td>${out.active}</td></tr><tr><td>Exited</td><td>${out.exited}</td></tr><tr><td>Stable at 90 days</td><td>${out.stableCount}</td></tr><tr><td>Unstable at 90 days</td><td>${out.unstableCount}</td></tr><tr><td>90-day outcome pending</td><td>${out.pending}</td></tr>`;breakdown('bd-exit',HOUSING_STATUS_FULL,h.filter(x=>x.housing_at_exit),x=>x.housing_at_exit);breakdown('bd-race',RACE_ETHNICITY,h,x=>x.race_ethnicity);breakdown('bd-age',['Under 18','18-24','25-34','35-44','45-54','55-61','62+'],h,x=>ageBand(x.age_primary));breakdown('bd-comp',HH_COMPOSITION,h,x=>x.hh_composition);breakdown('bd-event',QUALIFYING_EVENT,h,x=>x.qualifying_event);drawDash(h)}
function breakdown(id,opts,h,fn){let total=h.length,counts={};opts.forEach(o=>counts[o]=0);h.forEach(x=>{let v=fn(x);if(counts[v]!=null)counts[v]++});document.getElementById(id).innerHTML=opts.filter(o=>counts[o]).map(o=>`<tr><td>${esc(o)}</td><td>${counts[o]} <span style="color:var(--muted);font-weight:500">(${pct(total?counts[o]/total:0)})</span></td></tr>`).join('')||'<tr><td colspan="2" style="text-align:center;color:var(--muted)">No data yet</td></tr>'}
function drawDash(h){let qs=['Q1 FY26','Q2 FY26','Q3 FY26','Q4 FY26'],counts=qs.map(q=>h.filter(x=>fiscalQuarter(x.intake_date)===q).length),amounts=qs.map(q=>h.filter(x=>fiscalQuarter(x.intake_date)===q).reduce((s,x)=>s+assistTotal(x),0));draw('chartQ','bar',qs,counts,'Households');draw('chartA','line',qs,amounts,'Assistance $')}function draw(id,type,labels,data,label){if(state.charts[id])state.charts[id].destroy();let ctx=document.getElementById(id);state.charts[id]=new Chart(ctx,{type,data:{labels,datasets:[{label,data,borderWidth:2,backgroundColor:'rgba(37,99,235,.35)',borderColor:'#1B2F5B',tension:.25,fill:type==='line'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}})}

function reportScopedHouseholds(){
  let base=scopedHouseholds();
  if(isCity()){
    let agency=state.reportAgency||'all';
    if(agency==='apla'||agency==='ncjw') return state.households.filter(h=>String(h.agency_id).toLowerCase()===agency);
    return state.households;
  }
  return base;
}
function reportScopeLabel(){
  if(isCity()){
    if((state.reportAgency||'all')==='all') return 'Systemwide / All Agencies';
    return agencyName(state.reportAgency);
  }
  return filterLabel();
}

function renderExport(){
  let q=REPORT_QUARTERS[state.reportQuarter]||REPORT_QUARTERS['Q4-2026'];
  let base=reportScopedHouseholds();
  let h=base.filter(x=>inReportQuarter(x,state.reportQuarter));
  let out=outcomeSummary(h);
  let assist=h.reduce((s,x)=>s+assistTotal(x),0);
  let serv=h.reduce((s,x)=>s+sessions(x),0);

  let assistanceByType={};
  h.forEach(x=>(x.assistance_log||[]).forEach(e=>{
    if(betweenDates(e.date,q.start,q.end)){
      let k=e.type||'Other / Unknown';
      assistanceByType[k]=(assistanceByType[k]||0)+Number(e.amount||0);
    }
  }));
  let serviceByType={};
  h.forEach(x=>(x.service_log||[]).forEach(e=>{
    if(betweenDates(e.date,q.start,q.end)){
      let k=e.type||'Other / Unknown';
      serviceByType[k]=(serviceByType[k]||0)+1;
    }
  }));

  let assistanceRows=Object.entries(assistanceByType).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${money(v)}</td></tr>`).join('')||'<tr><td colspan="2">No assistance logged during this quarter.</td></tr>';
  let serviceRows=Object.entries(serviceByType).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v}</td></tr>`).join('')||'<tr><td colspan="2">No service activity logged during this quarter.</td></tr>';

  let noData = h.length===0 ? `<div class="notice" style="margin:18px 0;background:#FEF3C7;border:1px solid #F59E0B;color:#78350F;padding:12px 14px;border-radius:8px;font-size:13px;"><strong>No records found for ${reportScopeLabel()} during ${q.label} ${q.fy}.</strong><br>Records are included when they have an intake date, financial assistance date, service date, or active assistance period between ${q.period}.</div>` : '';

  let agencySummary=(isCity()&&(state.reportAgency||'all')==='all')?`<div class="export-section"><h2>Agency Summary</h2><table class="print-table"><thead><tr><th>Agency</th><th>Households Served</th><th>Financial Assistance</th><th>Service Sessions</th><th>Stable at 90 Days</th></tr></thead><tbody>${['apla','ncjw'].map(a=>{let r=h.filter(x=>String(x.agency_id).toLowerCase()===a),o=outcomeSummary(r);return`<tr><td>${agencyName(a)}</td><td>${r.length}</td><td>${money(r.reduce((s,x)=>s+assistTotal(x),0))}</td><td>${r.reduce((s,x)=>s+sessions(x),0)}</td><td>${o.base?`${o.stableCount} of ${o.base} (${pct(o.stableCount/o.base)})`:'Pending / N/A'}</td></tr>`}).join('')}</tbody></table></div>`:'';

  document.getElementById('view-export').innerHTML=`<div class="page-head no-print"><div><h1 class="page-title">Quarterly Program Report Export</h1><p class="page-sub">Select the quarter, then print or save as PDF for signature and email submission.</p></div><div class="export-controls"><select onchange="state.reportQuarter=this.value;renderExport()">${Object.entries(REPORT_QUARTERS).map(([k,v])=>`<option value="${k}" ${state.reportQuarter===k?'selected':''}>${v.label} · ${v.period}</option>`).join('')}</select>${isCity()?`<select onchange="state.reportAgency=this.value;renderExport()"><option value="all" ${state.reportAgency==='all'?'selected':''}>Systemwide / All Agencies</option><option value="apla" ${state.reportAgency==='apla'?'selected':''}>APLA</option><option value="ncjw" ${state.reportAgency==='ncjw'?'selected':''}>NCJW</option></select>`:''}<button class="btn" onclick="window.print()">Print / Save PDF</button></div></div><div class="export-page"><div style="display:flex;justify-content:space-between;gap:20px;align-items:flex-start;border-bottom:3px solid var(--gold);padding-bottom:16px"><div><p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;font-weight:900;margin:0 0 6px">City of West Hollywood · Human Services Division</p><h1 class="export-title">RPHP Quarterly Program Report</h1><p style="margin:4px 0;color:#4b5563">Homelessness Prevention & Housing Stabilization</p></div><div style="text-align:right;font-size:12px;color:#4b5563"><strong>${q.label} · ${q.fy}</strong><br>${q.period}<br>Generated ${new Date().toLocaleDateString()}</div></div>${noData}<div class="report-meta-grid"><div class="report-meta-box"><div class="label">Reporting agency</div><div class="value">${reportScopeLabel()}</div></div><div class="report-meta-box"><div class="label">Reporting period</div><div class="value">${q.period}</div></div><div class="report-meta-box"><div class="label">Prepared by</div><div class="value">${esc(state.profile.name||state.profile.email)}</div></div></div><div class="export-section"><h2>Program Summary</h2>
<div class="cards" style="grid-template-columns:repeat(4,1fr)">
<div class="card kpi"><div class="label">Households served</div><div class="value">${h.length}</div></div>
<div class="card kpi"><div class="label">New intakes</div><div class="value">${quarterMetrics(h,state.reportQuarter).newIntakes}</div></div>
<div class="card kpi"><div class="label">Ongoing households</div><div class="value">${quarterMetrics(h,state.reportQuarter).ongoingCases}</div></div>
<div class="card kpi"><div class="label">Cases closed</div><div class="value">${quarterMetrics(h,state.reportQuarter).closedCases}</div></div>
</div>
<div class="cards" style="grid-template-columns:repeat(4,1fr);margin-top:14px">
<div class="card kpi"><div class="label">Financial assistance</div><div class="value">${money(assist)}</div></div>
<div class="card kpi"><div class="label">Service sessions</div><div class="value">${serv}</div></div>
<div class="card kpi"><div class="label">Stable at 90 days</div><div class="value">${pct(out.base?out.stableCount/out.base:0)}</div><div class="sub">${out.stableCount} of ${out.base}</div></div>
<div class="card kpi"><div class="label">Active at quarter end</div><div class="value">${out.active}</div></div>
</div>
</div>${agencySummary}<div class="export-section"><h2>Outcome Summary</h2><table class="print-table"><tbody><tr><td>Active / in progress at end of period</td><td>${out.active}</td></tr><tr><td>Exited during or before report generation</td><td>${out.exited}</td></tr><tr><td>Stable housing confirmed at 90 days</td><td>${out.stableCount}</td></tr><tr><td>Unstable housing status at 90 days</td><td>${out.unstableCount}</td></tr><tr><td>90-day outcome pending / not yet due</td><td>${out.pending}</td></tr></tbody></table></div><div class="export-section"><h2>Quarter Activity</h2><div class="grid2"><table class="print-table"><thead><tr><th>Financial Assistance Type</th><th>Amount</th></tr></thead><tbody>${assistanceRows}</tbody></table><table class="print-table"><thead><tr><th>Service Type</th><th>Sessions</th></tr></thead><tbody>${serviceRows}</tbody></table></div></div><div class="export-section"><h2>Demographics Summary</h2><div class="grid2"><table class="print-table"><thead><tr><th colspan="2">Race / Ethnicity</th></tr></thead><tbody>${breakdownRows(RACE_ETHNICITY,h,x=>x.race_ethnicity)}</tbody></table><table class="print-table"><thead><tr><th colspan="2">Age Band</th></tr></thead><tbody>${breakdownRows(['Under 18','18-24','25-34','35-44','45-54','55-61','62+'],h,x=>ageBand(x.age_primary))}</tbody></table><table class="print-table"><thead><tr><th colspan="2">Household Composition</th></tr></thead><tbody>${breakdownRows(HH_COMPOSITION,h,x=>x.hh_composition)}</tbody></table><table class="print-table"><thead><tr><th colspan="2">Qualifying Event</th></tr></thead><tbody>${breakdownRows(QUALIFYING_EVENT,h,x=>x.qualifying_event)}</tbody></table></div></div><div class="export-section"><h2>Household Detail</h2><table class="print-table"><thead><tr><th>ID</th>${isCity()?'<th>Agency</th>':''}<th>Intake</th><th>Composition</th><th>Assistance</th><th>Sessions</th><th>Exit Status</th><th>90-Day Outcome</th></tr></thead><tbody>${h.map(x=>`<tr><td>${esc(x.hh_id)}</td>${isCity()?`<td>${esc(agencyName(String(x.agency_id).toLowerCase()))}</td>`:''}<td>${esc(x.intake_date||'—')}</td><td>${esc(x.hh_composition||'—')}</td><td>${money(assistTotal(x))}</td><td>${sessions(x)}</td><td>${esc(x.housing_at_exit||'Active / Pending')}</td><td>${stable(x)==='stable'?'Stable':stable(x)==='unstable'?'Unstable':'Pending'}</td></tr>`).join('')||`<tr><td colspan="${isCity()?8:7}">No records for this reporting period.</td></tr>`}</tbody></table></div><div class="export-section"><h2>Certification</h2><p style="font-size:12px;line-height:1.6;color:#374151">I certify that the information included in this quarterly program report is accurate to the best of my knowledge and reflects records entered for the reporting period identified above.</p><div class="signature-grid"><div class="signature-line">Authorized Agency Representative Signature / Date</div><div class="signature-line">Printed Name / Title</div></div></div></div>`
}
function breakdownRows(opts,h,fn){let total=h.length,counts={};opts.forEach(o=>counts[o]=0);h.forEach(x=>{let v=fn(x);if(counts[v]!=null)counts[v]++});return opts.filter(o=>counts[o]).map(o=>`<tr><td>${esc(o)}</td><td style="text-align:right"><strong>${counts[o]}</strong> (${pct(total?counts[o]/total:0)})</td></tr>`).join('')||'<tr><td>No data yet</td></tr>'}
function renderUsers(){if(!isAdmin()){document.getElementById('view-users').innerHTML='<p>Admin access required.</p>';return}let rows=state.users.map(u=>`<tr><td><strong>${esc(u.name||'—')}</strong><br><span style="color:var(--muted)">${esc(u.email)}</span></td><td>${esc(agencyName(u.agency_id))}</td><td><span class="status ${u.user_type.startsWith('city')?'city':'agency'}">${esc(u.user_type.replace('_',' '))}</span></td><td><span class="status ${u.active?'active':'inactive'}">${u.active?'Active':'Inactive'}</span></td><td><button class="btn secondary sm" onclick='openUserModal(${JSON.stringify(u)})'>Edit</button> <button class="btn ${u.active?'danger':'subtle'} sm" onclick="setActive('${esc(u.email)}',${!u.active})">${u.active?'Deactivate':'Reactivate'}</button></td></tr>`).join('')||'<tr><td colspan="5">No users found.</td></tr>';document.getElementById('view-users').innerHTML=`<div class="page-head"><div><h1 class="page-title">User Management</h1><p class="page-sub">Maintain name, email, agency affiliation, user type, and active status.</p></div><button class="btn" onclick="openUserModal()">+ Add User</button></div><div class="table-wrap"><table><thead><tr><th>User</th><th>Agency</th><th>User Type</th><th>Status</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>`}
function populateAgencySelect(){let s=document.getElementById('um-agency');s.innerHTML=AGENCIES.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('')}function openUserModal(u=null){populateAgencySelect();document.getElementById('user-modal-title').textContent=u?'Edit User':'Add User';document.getElementById('um-original-email').value=u?.email||'';document.getElementById('um-name').value=u?.name||'';document.getElementById('um-email').value=u?.email||'';document.getElementById('um-agency').value=u?.agency_id||'apla';document.getElementById('um-role').value=u?.user_type||'agency_user';document.getElementById('um-active').value=String(u?.active??true);document.getElementById('user-modal').classList.add('open')}function closeUserModal(){document.getElementById('user-modal').classList.remove('open')}
async function saveUser(e){e.preventDefault();let payload={p_email:document.getElementById('um-email').value.trim().toLowerCase(),p_name:document.getElementById('um-name').value.trim(),p_agency_id:document.getElementById('um-agency').value,p_user_type:document.getElementById('um-role').value,p_active:document.getElementById('um-active').value==='true'};if(DEMO_MODE){toast('Saved user (demo)','ok');closeUserModal();return}let {error}=await sb.rpc('rphp_admin_upsert_user',payload);if(error){toast('User save failed: '+error.message,'err');return}toast('User saved','ok');closeUserModal();await loadUsers();renderUsers()}
async function setActive(email,active){if(!confirm(`${active?'Reactivate':'Deactivate'} ${email}?`))return;let {error}=await sb.rpc('rphp_admin_set_user_active',{p_email:email,p_active:active});if(error){toast('Update failed: '+error.message,'err');return}toast('User updated','ok');await loadUsers();renderUsers()}
function renderActivity(){let rows=state.activity.map(a=>`<tr><td>${new Date(a.created_at).toLocaleString()}</td><td>${esc(a.actor_email||'—')}</td><td>${esc(agencyName(a.agency_id))}</td><td>${esc(a.hh_id||'—')}</td><td>${esc(a.action)}</td></tr>`).join('')||'<tr><td colspan="5">No activity.</td></tr>';document.getElementById('view-activity').innerHTML=`<div class="page-head"><div><h1 class="page-title">Recent Activity</h1><p class="page-sub">Admin-only audit trail.</p></div></div><div class="table-wrap"><table><thead><tr><th>Date</th><th>User</th><th>Agency</th><th>Household</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table></div>`}
function renderBackup(){document.getElementById('view-backup').innerHTML=`<div class="page-head"><div><h1 class="page-title">Backup Data</h1><p class="page-sub">Admin-only JSON export of the visible database records.</p></div><button class="btn" onclick="backup()">Download Backup</button></div><div class="card"><div class="card-body">Use this to create a point-in-time backup of household records, user records, and recent activity. Restore/import is intentionally not included to avoid accidental overwrites.</div></div>`}function backup(){let blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),households:state.households,users:state.users,activity:state.activity},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rphp_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href)}
init().catch(e=>{console.error(e);document.getElementById('login-msg').className='msg err';document.getElementById('login-msg').textContent=e.message||String(e)});
</script>
</body></html>
